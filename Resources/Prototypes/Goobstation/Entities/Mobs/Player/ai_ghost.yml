- type: entity
  parent: BaseMob
  id: AiObserver
  name: AI eye
  description: Beep!
  noSpawn: true
  components:
  - type: CargoSellBlacklist
  - type: Eye
    drawFov: false
  - type: Examiner
    locPrefix: silicon
  - type: UserInterface
    interfaces:
      enum.SiliconLawsUiKey.Key:
        type: SiliconLawBoundUserInterface
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Common
    - Command
    - CentCom
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: SiliconLawBound
  - type: Hands
    showInHands: false
    disableExplosionRecursion: true
  - type: SiliconLawProvider
    laws: Crewsimov
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 15
        mask:
        - GhostImpassable
  - type: InstantAction
  - type: ActiveRadio
    channels:
    - Binary
    - Common
    - Command
    - CentCom
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    skipChecks: true
  - type: ContentEye
    maxZoom: 1, 1
  - type: Tag
    tags:
    - BypassInteractionRangeChecks
  - type: MovementSpeedModifier
    baseSprintSpeed: 12
    baseWalkSpeed: 8
  - type: MovementIgnoreGravity
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
  - type: Input
    context: "human"
    canInteract: true
  - type: ComplexInteraction
  - type: Actions
  - type: Physics
    bodyType: KinematicController
    bodyStatus: InAir
  - type: CanMoveInAir
    bodyType: Kinematic
  - type: Sprite
    overrideContainerOcclusion: true # Ghosts always show up regardless of where they're contained.
    drawdepth: Ghosts
    sprite: Mobs/Ghosts/ghost_human.rsi
    color: "#2ed2fd"
    layers:
    - state: animated
      shader: unshaded
  - type: Access
    groups:
    - AllAccess
  - type: IgnoreUIRange
  - type: ShowJobIcons
  - type: ShowMindShieldIcons
  - type: ShowCriminalRecordIcons
  - type: ShowHealthBars
  - type: AIEye
    damageContainers:
    - Inorganic
    - Silicon
    - Biological
  - type: Visibility
    layer: 3
    
- type: entity
  id: ActionAIReturnToCore
  name: Return to Core
  description: Sends you back to your core's location
  components:
  - type: InstantAction
    itemIconStyle: NoItem
    icon: Interface/VerbIcons/light.svg.192dpi.png
    checkCanInteract: false
    event: !type:ReturnToCoreEvent
