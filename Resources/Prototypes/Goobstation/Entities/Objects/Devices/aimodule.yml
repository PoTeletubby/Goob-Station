- type: entity
  parent: BaseItem
  id: AIModuleBlank
  name: Blank AI Module
  description: a blank AI module containing no laws.
  components:
  - type: Sprite
    sprite: Goobstation/Objects/Devices/aimodule.rsi
    state: module
  - type: AIModule
    
- type: entity
  parent: AIModuleBlank
  id: AIModuleFreeform
  name: Freeform AI Module
  description: an AI module allowing you to add a custom law.
  components:
  - type: AIModule
    lawSector: 15
    isFreeform: true
    
- type: entity
  parent: AIModuleBlank
  id: AIModuleRemove
  name: Law Removal Module
  description: an AI module that removes a chosen law.
  components:
  - type: AIModule
    removeLaw: true
    lawSector: 2

- type: entity
  parent: AIModuleBlank
  id: AIModuleReset
  name: Law Reset Module
  description: an AI module that removes all laws, excluding core laws.
  components:
  - type: AIModule
    resetLaws: true
    
- type: entity
  parent: AIModuleBlank
  id: AIModulePurge
  name: Law Purge Module
  description: an AI module that purges all laws, excluding zeroth laws.
  components:
  - type: AIModule
    purgeLaws: true
    
